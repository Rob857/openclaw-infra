---
- name: Check if openclaw-gateway service file exists
  ansible.builtin.stat:
    path: /home/ubuntu/.config/systemd/user/openclaw-gateway.service
  register: daemon_service

- name: Install OpenClaw daemon
  ansible.builtin.shell: |
    export XDG_RUNTIME_DIR=/run/user/1000
    openclaw daemon install
  args:
    executable: /bin/bash
  when: not daemon_service.stat.exists

- name: Check daemon service file version matches installed binary
  when: daemon_service.stat.exists
  block:
    - name: Extract version from daemon service file
      ansible.builtin.shell: |
        grep -oP 'OPENCLAW_SERVICE_VERSION=\K[^\s"]+' /home/ubuntu/.config/systemd/user/openclaw-gateway.service 2>/dev/null || echo ""
      args:
        executable: /bin/bash
      register: daemon_service_version
      changed_when: false

    - name: Get installed openclaw version
      ansible.builtin.command: openclaw --version
      register: openclaw_binary_version
      changed_when: false

    - name: Extract binary semver
      ansible.builtin.set_fact:
        openclaw_binary_semver: >-
          {{ openclaw_binary_version.stdout | regex_search('[0-9]+\.[0-9]+\.[0-9]+') | default('') }}

    - name: Regenerate daemon service file if version drifted
      ansible.builtin.shell: |
        export XDG_RUNTIME_DIR=/run/user/1000
        openclaw daemon install --force
        systemctl --user daemon-reload
        echo "REGENERATED: service={{ daemon_service_version.stdout | trim }} binary={{ openclaw_binary_semver }}"
      args:
        executable: /bin/bash
      register: daemon_version_regen
      changed_when: true
      notify: restart openclaw-gateway
      when: >-
        daemon_service_version.stdout | trim == "" or
        daemon_service_version.stdout | trim != openclaw_binary_semver

# Systemd drop-in: raise the WebSocket handshake timeout for the gateway process.
# No-op on 2026.3.13 (env var gated behind VITEST), takes effect on 2026.3.14+.
# See: https://github.com/openclaw/openclaw/issues/48167
- name: Ensure systemd override directory exists
  ansible.builtin.file:
    path: /home/ubuntu/.config/systemd/user/openclaw-gateway.service.d
    state: directory
    mode: "0755"

- name: Add handshake timeout override (forward-compat for openclaw/issues/48167)
  ansible.builtin.copy:
    content: |
      [Service]
      Environment=OPENCLAW_HANDSHAKE_TIMEOUT_MS=10000
    dest: /home/ubuntu/.config/systemd/user/openclaw-gateway.service.d/handshake-timeout.conf
    mode: "0644"
  notify:
    - reload user systemd
    - restart openclaw-gateway
